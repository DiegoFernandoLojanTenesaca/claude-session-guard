name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Compile
        run: python -m py_compile guard.py install.py uninstall.py
      - name: Self-test
        run: python test_guard.py
